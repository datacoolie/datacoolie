name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pipx install poetry==2.3.4

      - name: Cache virtualenv
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('poetry.lock') }}
          restore-keys: venv-${{ runner.os }}-

      - name: Install dependencies
        env:
          POETRY_VIRTUALENVS_IN_PROJECT: true
        run: |
          if [ "${{ steps.cache-venv.outputs.cache-hit }}" = "true" ]; then
            poetry install --only-root
          else
            poetry install --with dev
          fi

      - name: Validate Poetry metadata
        run: poetry check

      - name: Build package
        run: poetry build

      - name: Advisory Pytest
        continue-on-error: true
        run: poetry run pytest tests/ --tb=short