name: docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "pyproject.toml"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "pyproject.toml"
      - ".github/workflows/docs.yml"

permissions:
  contents: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pipx install poetry==2.3.4

      - name: Install docs dependencies
        run: poetry install --only main,docs --extras "spark polars db api excel aws iceberg deltalake"

      - name: Build docs (strict)
        run: poetry run mkdocs build --strict

      - name: Configure git (for mike)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config --global user.name "Ezalor"
          git config --global user.email "62685761+nguyenhieubis@users.noreply.github.com"

      - name: Deploy latest to gh-pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          poetry run mike deploy --push --update-aliases latest
          poetry run mike set-default --push latest