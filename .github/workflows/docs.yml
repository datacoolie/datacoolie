name: docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "pyproject.toml"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "pyproject.toml"
      - ".github/workflows/docs.yml"

permissions:
  contents: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.DOCS_DEPLOY_TOKEN || github.token }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pipx install poetry==2.3.4

      - name: Cache virtualenv
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-docs-${{ runner.os }}-${{ hashFiles('poetry.lock', 'pyproject.toml') }}
          restore-keys: venv-docs-${{ runner.os }}-

      - name: Install docs dependencies
        env:
          POETRY_VIRTUALENVS_IN_PROJECT: true
        run: |
          if [ "${{ steps.cache-venv.outputs.cache-hit }}" = "true" ]; then
            poetry install --only-root
          else
            poetry install --only main,docs --extras "polars db api excel aws iceberg deltalake"
          fi

      - name: Build docs (strict)
        run: poetry run mkdocs build --strict

      - name: Configure git (for mike)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config --global user.name "Ezalor"
          git config --global user.email "62685761+nguyenhieubis@users.noreply.github.com"

      - name: Deploy latest to gh-pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          poetry run mike deploy --push --update-aliases latest
          poetry run mike set-default --push latest