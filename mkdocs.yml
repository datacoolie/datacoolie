      - Configure database metadata: how-to/configure-database-metadata.md
      - Configure API metadata: how-to/configure-api-metadata.md
      - Run a stage: how-to/run-a-stage.md
      - Merge & SCD2: how-to/merge-and-scd2.md
      - Partitioning & sanitization: how-to/partitioning-and-sanitization.md
      - Maintenance (vacuum/optimize): how-to/maintenance-vacuum-optimize.md
      - Expected-failure scenarios: how-to/expected-failure-scenarios.md
      - Deploy to Fabric: how-to/deploy-to-fabric.md
      - Deploy to Databricks: how-to/deploy-to-databricks.md
      - Deploy to AWS Glue: how-to/deploy-to-aws-glue.md
  - Reference:
