      - Write a transformer: extending/writing-a-transformer.md
      - Write an engine: extending/writing-an-engine.md
      - Write a secret resolver: extending/writing-a-secret-resolver.md
      - Write a metadata provider: extending/writing-a-metadata-provider.md
  - Operations:
