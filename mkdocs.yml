      - Metadata schema: reference/metadata-schema.md
      - Plugin entry points: reference/plugin-entry-points.md
      - CLI: reference/cli.md
      - Environment variables: reference/environment-variables.md
      - API:
          - Core: reference/api/core.md
          - Engines: reference/api/engines.md
          - Platforms: reference/api/platforms.md
          - Sources: reference/api/sources.md
          - Destinations: reference/api/destinations.md
          - Transformers: reference/api/transformers.md
          - Orchestration: reference/api/orchestration.md
