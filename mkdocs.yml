      - Platforms: concepts/platforms.md
      - Metadata model: concepts/metadata-model.md
      - Metadata providers: concepts/metadata-providers.md
      - Sources & destinations: concepts/sources-and-destinations.md
      - Transformers & pipeline: concepts/transformers-and-pipeline.md
      - Load strategies: concepts/load-strategies.md
      - Watermarks: concepts/watermarks.md
      - Orchestration: concepts/orchestration.md
      - Logging: concepts/logging.md
