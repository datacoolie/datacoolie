## Skills Integration Test Environment
## Standalone Docker Compose — different ports from usecase-sim so both can run together.
##
## usecase-sim ports: PG=5432, MySQL=3306, MSSQL=1433, Oracle=1521, MinIO=9000/9001,
##                    Iceberg=8181, Trino=8080, API=8082
## skills-test ports: PG=5442, MySQL=3316, MSSQL=1444, Oracle=1522, MinIO=9010/9011,
##                    Iceberg=8182, Trino=8090, API=8092, Hive=10000
##
## Usage:
##   docker compose up -d --wait
##   python run_all.py        # seed MSSQL + Iceberg, then run all skill tests
##   docker compose down -v   # tear down + remove volumes

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — Pagila (DVD rental, port of MySQL Sakila)
  # ~15 tables, FKs, views, multiple schemas — auto-seeded via initdb.d
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: skills-test-postgres
    ports:
      - "5442:5432"
    environment:
      POSTGRES_DB: pagila
      POSTGRES_USER: datacoolie
      POSTGRES_PASSWORD: datacoolie
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./fixtures/postgres/pagila.sql:/docker-entrypoint-initdb.d/01-pagila.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datacoolie -d pagila"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # MySQL 8.4 — Sakila (MySQL's official sample DVD rental DB)
  # ~16 tables, views, stored procedures, FKs — auto-seeded via initdb.d
  # ---------------------------------------------------------------------------
  mysql:
    image: mysql:8.4
    container_name: skills-test-mysql
    ports:
      - "3316:3306"
    environment:
      MYSQL_DATABASE: sakila
      MYSQL_USER: datacoolie
      MYSQL_PASSWORD: datacoolie
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
      - ./fixtures/mysql/sakila.sql:/docker-entrypoint-initdb.d/01-sakila.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "datacoolie", "-pdatacoolie"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # SQL Server 2022 — AdventureWorks LT (Microsoft's lightweight sample)
  # SalesLT schema: ~12 tables, FKs, indexes
  # NOTE: MSSQL has no initdb.d — seeded post-start by run_all.py
  # ---------------------------------------------------------------------------
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: skills-test-mssql
    ports:
      - "1444:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Testing@123"
      MSSQL_PID: Developer
    volumes:
      - mssql_data:/var/opt/mssql
      - ./fixtures/mssql:/opt/mssql-scripts
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Testing@123' -No -Q 'SELECT 1' > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ---------------------------------------------------------------------------
  # Oracle 23 Free — HR schema (Oracle's classic 7-table HR sample)
  # Departments, Employees, Jobs, Locations, Countries, Regions, Job_History
  # ---------------------------------------------------------------------------
  oracle:
    image: gvenzl/oracle-free:23-slim
    container_name: skills-test-oracle
    ports:
      - "1522:1521"
    environment:
      ORACLE_PASSWORD: datacoolie
      APP_USER: hr
      APP_USER_PASSWORD: hr
    volumes:
      - oracle_data:/opt/oracle/oradata
      - ./fixtures/oracle/hr.sql:/container-entrypoint-initdb.d/01-hr.sql
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 60s

  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible storage backend for Iceberg
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: skills-test-minio
    ports:
      - "9010:9000"
      - "9011:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # Iceberg REST catalog — in-memory catalog, data files on MinIO S3
  # ---------------------------------------------------------------------------
  iceberg-rest:
    image: tabulario/iceberg-rest:latest
    container_name: skills-test-iceberg
    ports:
      - "8182:8181"
    environment:
      # In-memory catalog (no JDBC) — simple and reliable for testing
      CATALOG_WAREHOUSE: s3://skills-test/iceberg-warehouse
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_ACCESS__KEY__ID: minioadmin
      CATALOG_S3_SECRET__ACCESS__KEY: minioadmin
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
      CATALOG_S3_REGION: us-east-1
      AWS_REGION: us-east-1
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      # bash /dev/tcp works in any Linux image without curl/wget
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8181' 2>/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Trino — query engine for Iceberg catalog discovery
  # ---------------------------------------------------------------------------
  trino:
    image: trinodb/trino:latest
    container_name: skills-test-trino
    ports:
      - "8090:8080"
    volumes:
      - ./fixtures/iceberg/trino-catalog:/etc/trino/catalog
    depends_on:
      iceberg-rest:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      # trinodb/trino is Ubuntu-based — curl is available
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/v1/info | grep -q '\"starting\":false'"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Apache Hive 4 — HiveServer2 with embedded Derby metastore
  # Used for hive lakehouse introspection tests
  # ---------------------------------------------------------------------------
  hive:
    image: apache/hive:4.0.0
    container_name: skills-test-hive
    environment:
      SERVICE_NAME: hiveserver2
    ports:
      - "10000:10000"
    healthcheck:
      test: ["CMD-SHELL", "beeline -u 'jdbc:hive2://localhost:10000/default' --showHeader=false --outputformat=tsv2 -e 'SHOW DATABASES;' 2>/dev/null | grep -q 'default'"]
      interval: 20s
      timeout: 30s
      retries: 15
      start_period: 120s

  # Runs once after Hive is healthy — creates test schema datacoolie_test
  # Uses a retry wrapper (init.sh) so transient beeline failures don't break the env
  hive-init:
    image: apache/hive:4.0.0
    container_name: skills-test-hive-init
    depends_on:
      hive:
        condition: service_healthy
    volumes:
      - ./fixtures/hive:/init
    entrypoint: ["bash", "/init/init.sh"]
    restart: "no"

  # ---------------------------------------------------------------------------
  # Mock API — serves openapi-petstore.json at /openapi.json
  # Minimal Python HTTP server, no external dependencies
  # ---------------------------------------------------------------------------
  mock-api:
    image: python:3.12-slim
    container_name: skills-test-api
    ports:
      - "8092:8092"
    volumes:
      - ./fixtures/api:/app
    command: python /app/serve_spec.py
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8092/openapi.json', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  mysql_data:
  mssql_data:
  oracle_data:
  minio_data:
  hive_data:
